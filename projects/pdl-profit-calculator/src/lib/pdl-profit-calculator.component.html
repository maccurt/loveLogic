<div class="profit-calculator">

    <!-- show the product -->
    @if(true){

    <div class="grid-item">
        <div class="product-grid">

            <div class="image-area">
                <a target="_blank" [href]="store.incomeStatementList()[0].url">
                    <img class="image" [src]="store.imageUrl()">
                </a>
            </div>

            <div class="description-area">
                <div class="description">{{store.description()}}</div>
            </div>
        </div>
    </div>

    }

    <!-- show the income statement list -->
    @if(true){
    <div class="grid-item">
        <div class="income-statement-list-grid">

            @for(i of store.incomeStatementList();track $index){

            <div class="grid-item" *ngIf="i.show">
                <lib-income-statement [i]="i"></lib-income-statement>
            </div>
            }

        </div>
    </div>
    }
</div>
