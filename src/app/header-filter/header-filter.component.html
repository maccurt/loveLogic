@if(categoryStore){

<form [formGroup]="form">

    <div id="header-main-container">

        <div class="item-1">
            <header id="header">
                <div id="brand">
                    {{appStore.brandName()}}
                </div>

                @if (appStore.showStateSelection()){
                <div id="state-select">
                    <select id="location" class="select" formControlName="stateLocation">
                        <!-- TODO We do not want the business store in HERE-->
                        @for(state of appStore.locationList(); track $index){
                        <option [ngValue]="state"> {{state.name}} </option>
                        }
                    </select>
                </div>
                }
            </header>
        </div>

        <div class="item-2">
            <div id="category-filter">

                <mat-chip-listbox aria-orientation="horizontal">

                    @for(c of categoryStore.categoryList(); track $index){

                    @if(c.id === categoryStore.categorySelected().id){
                    <mat-chip-option title="click to filter by category" color="orange" class="category-chip selected"
                        (click)="categoryStore.categorySelectedEvent(c)">
                        {{c.name}}
                    </mat-chip-option>
                    }
                    @else{
                    <mat-chip-option title="click to filter by category" class="category-chip"
                        (click)="categoryStore.categorySelectedEvent(c)">
                        {{c.name}}
                    </mat-chip-option>
                    }

                    }
                </mat-chip-listbox>

            </div>

        </div>

    </div>


</form>

}
